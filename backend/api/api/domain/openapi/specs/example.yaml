openapi: '3.0.3'

info:
  title: Example OpenAPI Specification
  version: '1.0'
  description: A simple OpenAPI specification for testing purposes.
  termsOfService: https://example.com/terms/
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Bellanov Apilli
    url: https://github.com/bellanov
    email: bellanov@example.com

servers:
  - url: https://{environment}.example.com/
    variables:
      environment:
        default: api    # Production server
        enum:
          - api         # Production server
          - api.dev     # Development server
          - api.staging # Staging server

paths:
  /v1/customers:
    get:
      summary: List all customers
      description: Retrieve a paginated list of all customers in the system
      operationId: listCustomers
      responses:
        '200':
          description: List of Customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerPagedList"
        '404':
          description: Customers not found

  /v1/beers:
    get:
      summary: List all beers
      description: Retrieve a paginated list of all available beers
      operationId: listBeers
      responses:
        '200':
          description: List of Beers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeerPagedList"
        '404':
          description: Beers not found

components:
  schemas:
    Address:
      type: object
      description: Physical address information
      properties:
        street:
          type: string
          example: 123 Main St
        city:
          type: string
          example: Anytown
        state:
          type: string
          description: US state code
          # enum: [CA, NY, TX, FL, IL]
          enum:
            - CA
            - NY
            - TX
            - FL
            - IL
          minLength: 2
          maxLength: 2
          example: CA
        zipCode:
          type: string
          example: '12345'
    
    Customer:
      type: object
      description: Represents a customer with contact and address information
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        firstName:
          type: string
          example: John
          minLength: 2
          maxLength: 100
        lastName:
          type: string
          example: Doe
          minLength: 2
          maxLength: 100
        address:
          $ref: "#/components/schemas/Address"
    
    CustomerList:
      type: object
      description: Customer list object
      properties:
        customers:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/Customer"
    
    CustomerPagedList:
      type: object
      description: Customer paged response object
      allOf:
        - $ref: "#/components/schemas/PagedResponse"
      properties:
        content:
          $ref: "#/components/schemas/CustomerList"

    Beer:
      type: object
      description: Represents a beer product with brewery and style information
      properties:
        id:
          type: string
          format: uuid
          example: '123e4567-e89b-12d3-a456-426614174000'
        name:
          type: string
          description: The name of the beer.
          example: Lager
          minLength: 2
          maxLength: 100
        brewery:
          type: object
          properties:
            name:
              type: string
              description: The name of the brewery.
              example: Aviator Brewery
              minLength: 2
              maxLength: 100
            location:
              type: string
              description: The location of the brewery.
              example: Fuquay Varina, USA
              minLength: 2
              maxLength: 100
        style:
          type: string
          description: The style of the beer.
          example: PALE_ALE
          enum: [ALE, PALE_ALE, IPA, WHEAT, LAGER]
          minLength: 2
          maxLength: 100
    
    BeerList:
      type: object
      description: Beer list object
      properties:
        beers:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/Beer"

    BeerPagedList:
      type: object
      description: Beer paged response object
      allOf:
        - $ref: "#/components/schemas/PagedResponse"
      properties:
        content:
          $ref: "#/components/schemas/BeerList"

    PagedResponse:
      type: object
      description: Standard pagination metadata for list endpoints
      properties:
        page:
          type: integer
          example: 1
          minimum: 1
        pageSize:
          type: integer
          example: 10
          minimum: 1
          maximum: 100
        totalPages:
          type: integer
          example: 5
          minimum: 1
        totalItems:
          type: integer
          example: 50
          minimum: 0
