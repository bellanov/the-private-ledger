openapi: 3.0.3
info:
  title: Missing Operation Summary Example
  description: This spec violates the operation-summary-required rule.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://api.example.com/v1
    description: Production server

paths:
  /items:
    get:
      # Missing summary - violates operation-summary-required (error)
      description: Returns a list of items.
      operationId: listItems
      tags:
        - items
      responses:
        "200":
          description: A list of items.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
