<div id="todos-list">
  <div class="todo-item">
    <input type="checkbox" 
           hx-put="/api/todos/1"
           hx-vals='{"completed": "true"}'
           hx-target="closest .todo-item"
           hx-swap="outerHTML">
    <span>Learn HTMX</span>
    <button hx-delete="/api/todos/1" 
            hx-target="closest .todo-item"
            hx-swap="outerHTML swap:1s">Delete</button>
  </div>
  <div class="todo-item">
    <input type="checkbox" 
           hx-put="/api/todos/2"
           hx-vals='{"completed": "true"}'
           hx-target="closest .todo-item"
           hx-swap="outerHTML">
    <span>Build a project</span>
    <button hx-delete="/api/todos/2" 
            hx-target="closest .todo-item"
            hx-swap="outerHTML swap:1s">Delete</button>
  </div>
  <div class="todo-item">
    <input type="checkbox" 
           hx-put="/api/todos/3"
           hx-vals='{"completed": "true"}'
           hx-target="closest .todo-item"
           hx-swap="outerHTML">
    <span>Deploy to production</span>
    <button hx-delete="/api/todos/3" 
            hx-target="closest .todo-item"
            hx-swap="outerHTML swap:1s">Delete</button>
  </div>
</div>
