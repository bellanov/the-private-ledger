<div class="todo-item">
  <input type="checkbox" 
         hx-put="/api/todos/new"
         hx-vals='{"completed": "true"}'
         hx-target="closest .todo-item"
         hx-swap="outerHTML">
  <span>New Todo</span>
  <button hx-delete="/api/todos/new" 
          hx-target="closest .todo-item"
          hx-swap="outerHTML swap:1s">Delete</button>
</div>
