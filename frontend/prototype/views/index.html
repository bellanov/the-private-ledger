<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Private Ledger - Prototypes</title>
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
      integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div>
      <header>
        <h1>Prototypes</h1>
        <p class="subtitle">Various prototypes of <i>The Private Ledger</i>.</p>
      </header>

      <main>
        <section>
          <div
            hx-get="/accounts"
            hx-trigger="load delay:1s"
            hx-swap="outerHTML"
          ></div>
        </section>

        <section>
          <div
            hx-get="/performance"
            hx-trigger="load delay:1s"
            hx-swap="outerHTML"
          ></div>
        </section>

        <section>
          <div
            hx-get="/transactions"
            hx-trigger="load delay:1s"
            hx-swap="outerHTML"
          ></div>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 The Private Ledger.</p>
      </footer>
    </div>
  </body>
</html>
