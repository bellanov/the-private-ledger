name: Prototype CI

on:
  push:
    branches: [ main, develop ]
    paths:
    - "frontend/prototype/**"
  pull_request:
    branches: [ main, develop ]
    paths:
    - "frontend/prototype/**"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [ '22', '24', '26' ]

    defaults:
      run:
        working-directory: frontend/prototype

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/prototype/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint --if-present

    - name: Run tests
      run: npm test

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.node-version == '24'
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [ '22', '24', '26' ]

    defaults:
      run:
        working-directory: frontend/prototype

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/prototype/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint --if-present

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: test

    strategy:
      matrix:
        node-version: [ '22', '24', '26' ]

    defaults:
      run:
        working-directory: frontend/prototype

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/prototype/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Verify the application starts
      run: timeout 5 npm start &
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [ '22', '24', '26' ]

    defaults:
      run:
        working-directory: frontend/prototype

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/prototype/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
